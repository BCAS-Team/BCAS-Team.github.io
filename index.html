<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCAS | Age Verification</title>
  <link rel="stylesheet" href="age_gate.css" /> </head>
<body>

  <div id="age-gate-container">
    <div class="age-gate-content">
      <h2>ARE YOU 18+?</h2>
      <p>This site contains material that may be sensitive or unsuitable for minors. Please confirm your age and solve the CAPTCHA to proceed.</p>
      
      <div class="captcha-container">
        <div id="captcha-display" class="captcha-display"></div>
        <button id="refresh-captcha-btn" aria-label="Refresh CAPTCHA">↻</button>
        <input type="text" id="captcha-input" placeholder="Enter CAPTCHA here" aria-label="CAPTCHA input" />
        <p id="captcha-message" class="captcha-message"></p>
      </div>

      <button id="confirm-age-btn">YES, I AM 18+</button>
      <button id="decline-age-btn">NO, REDIRECT ME</button>
    </div>
  </div>

  <script src="age_gate.js"></script> </body>
</html>
