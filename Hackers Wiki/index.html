<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BCAS Wiki</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>BCAS</h1>
  <input type="search" id="search" placeholder="Search..." />
  <button id="hamburger" aria-label="Toggle Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<nav id="sidebar">
  <ul>
    <li><button class="category-btn active" data-category="tools">Tools</button></li>
    <li><button class="category-btn" data-category="tutorials">Tutorials</button></li>
    <li><button class="category-btn" data-category="concepts">Concepts</button></li>
    <li><button class="category-btn" data-category="resources">Resources</button></li>
  </ul>
</nav>

<main id="content">
  <p>Loading...</p>
</main>

<!-- Gemini Chat Toggle Button -->
<button id="chat-toggle">Chat</button>

<!-- Floating Gemini Chatbox -->
<section id="chatbox" class="hidden">
  <div id="chat-log"></div>
  <div id="chat-input-container">
    <input type="text" id="chat-input" placeholder="Ask Gemini..." />
    <button id="send-btn">Send</button>
  </div>
</section>

<script src="main.js"></script>
</body>
</html>
